name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    if: github.event.release.prerelease == false || github.event.release.prerelease == true
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
