name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Build docs
        run: npm run docs:build
